<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoWise - Showroom</title>
  <link rel="stylesheet" href="MainPage.css" />
  <link rel="stylesheet" href="results.css" />
  <link rel="stylesheet" href="settings.css" />
  <link rel="icon" type="image/svg+xml" href="editables/logo.svg" class="filter">
</head>
<body>

<header>
  <div class="header-left">
    <img src="editables/logo.svg" alt="AutoWise Logo" class="logo-icon" id="logoIcon">
    <span class="logo-text">SHOWROOM</span>
  </div>

  <form action="#" method="GET" class="search-form" onsubmit="return false;">
    <div class="search-container">
      <input type="text" id="search-bar" placeholder="Search..." autocomplete="off" />
      <button type="submit" class="search-button">
        <img src="editables/search.svg" alt="Search" class="search-icon" />
      </button>
    </div>
  </form>

  <div class="search-results" id="searchResults"></div>

  <div class="header-right">
    <div class="welcome-message" id="welcomeMessage"></div>
    <div class="user-menu" id="userMenu">
      <img src="editables/user.svg" alt="User Menu" class="user-icon" id="userIcon">
      <div class="dropdown" id="dropdownMenu"></div>
    </div>
  </div>
</header>

<div class="container">
  <div class="sidebar">
    <div class="menu-header">
      <h2 class="menu-title">Menu</h2>
      <div class="toggle-btn" id="toggleSidebar">
        <img src="editables/toggle-collapse.svg" alt="Toggle Menu" id="toggle-icon">
      </div>
    </div>

    <div class="nav-item"><a href="index.html"><img src="editables/home.svg" alt="Home" class="nav-icon"><span>Home</span></a></div>
    <div class="nav-item"><a href="showroom.html"><img src="editables/car.svg" alt="Showroom" class="nav-icon"><span>Showroom</span></a></div>
    <div class="nav-item"><a href="sold-gallery.html"><img src="editables/car.svg" alt="Sold Gallery" class="nav-icon"><span>Sold Gallery</span></a></div>
    <div class="nav-item"><a href="warranty.html"><img src="editables/warranty.svg" alt="Warranty" class="nav-icon"><span>Warranty</span></a></div>
    <div class="nav-item"><a href="we-buy-cars.html"><img src="editables/support.svg" alt="We Buy Cars" class="nav-icon"><span>We Buy Cars</span></a></div>
    <div class="nav-item"><a href="about.html"><img src="editables/user.svg" alt="About" class="nav-icon"><span>About Us</span></a></div>
    <div class="nav-item"><a href="reviews.html"><img src="editables/reviews.svg" alt="Reviews" class="nav-icon"><span>Reviews</span></a></div>
  </div>

  <div class="content">
    <div class="hero-section">
      <div class="hero-text">
        <h1>Showroom</h1>
        <p>Explore our available vehicles below.</p>
      </div>
    </div>

    <div class="inventory-grid">
      <div class="car-card">
        <img src="Editables/car1.jpg" alt="Car 1" class="car-image">
        <h4>Sample Vehicle A</h4>
        <p>Price: $20,000 · Mileage: 10,000mi</p>
        <a href="#" class="btn-primary">View Details</a>
      </div>
      <div class="car-card">
        <img src="Editables/car2.jpg" alt="Car 2" class="car-image">
        <h4>Sample Vehicle B</h4>
        <p>Price: $25,500 · Mileage: 22,000mi</p>
        <a href="#" class="btn-primary">View Details</a>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="firebase-init.js"></script>
<script src="settings-manager.js"></script>

<script src="site.js"></script>
<script src="search.js"></script>
<script src="firebaseService.js"></script>

</body>
</html>
